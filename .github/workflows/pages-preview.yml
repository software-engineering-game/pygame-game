name: Deploy Game (pygbag)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-pygbag
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          python -m pip install "pygbag>=0.9.2"

      - name: Build game
        run: |
          rm -rf build build/web-cache
          python -u -m pygbag --build --ume_block 0 .
          
      - name: Add deploy version marker
        run: |
          echo "commit=${GITHUB_SHA}" > build/web/deploy_version.txt
          echo "deployed_at=$(date -u)" >> build/web/deploy_version.txt
          cat build/web/deploy_version.txt

      - name: Debug build output
        run: |
          echo "build:"
          ls -la build || true
          echo "build/web:"
          ls -la build/web || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
    steps:
      - name: Deploy to Pages
        uses: actions/deploy-pages@v4

  deploy-to-server:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download server artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: deploy

      - name: Show downloaded files
        run: |
          echo "deploy:"
          ls -la deploy || true

      - name: Clear server web folder
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            rm -rf ~/game/build/web
            mkdir -p ~/game/build/web

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "deploy/*"
          target: "~/game/build/web"
          overwrite: true
          strip_components: 1

      - name: Restart server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "Restarting server..."
            cd ~/game/build/web || exit 1

            echo "Current deployed version:"
            cat deploy_version.txt || true

            cat > server.py <<'PY'
            from http.server import SimpleHTTPRequestHandler, ThreadingHTTPServer

            class NoCacheHandler(SimpleHTTPRequestHandler):
                def end_headers(self):
                    self.send_header("Cache-Control", "no-store, no-cache, must-revalidate, max-age=0")
                    self.send_header("Pragma", "no-cache")
                    self.send_header("Expires", "0")
                    super().end_headers()

            ThreadingHTTPServer(("0.0.0.0", 15089), NoCacheHandler).serve_forever()
            PY

            pids=$(ps -ef | grep -E 'python3 .*http.server 15089|python3 .*server.py' | grep -v grep | awk '{print $2}')
            if [ -n "$pids" ]; then
              kill $pids || true
              sleep 1
            fi

            nohup python3 server.py >/dev/null 2>&1 </dev/null &
            sleep 2

            echo "Running server process:"
            ps -ef | grep 'python3 .*server.py' | grep -v grep
