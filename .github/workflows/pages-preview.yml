      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install pygbag
        run: |
          python -m pip install --upgrade pip
          python -m pip install pygbag

      - name: Cache pygbag toolchain
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache
