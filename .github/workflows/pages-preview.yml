name: Deploy Game (pygbag)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: deploy-pygbag
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          python -m pip install --upgrade pip
          python -m pip install "pygbag>=0.9.2"

      - name: Build game
        run: |
          rm -rf build build/web-cache
          python -u -m pygbag --build --ume_block 0 .

      - name: Debug build output
        run: |
          echo "build:"
          ls -la build || true
          echo "build/web:"
          ls -la build/web || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
    steps:
      - name: Deploy to Pages
        uses: actions/deploy-pages@v4

  deploy-to-server:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download server artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: deploy

      - name: Show downloaded files
        run: |
          echo "deploy:"
          ls -la deploy || true

      - name: Copy files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "deploy/*"
          target: "~/game/build/web"
          overwrite: true
          strip_components: 1

      - name: Restart server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            echo "Restarting server..."
            mkdir -p ~/game/build/web
            pkill -f "http.server 15089" || true
            cd ~/game/build/web || exit 1
            nohup python3 -m http.server 15089 > server.log 2>&1 &
            sleep 2
            ps aux | grep http.server | grep -v grep || true
